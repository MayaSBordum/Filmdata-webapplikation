<!DOCTYPE html>
<html lang='da'>

<head>
    <meta charset='UTF-8'>
    <title>Mine favoritter</title>
    <link rel='stylesheet' href='/static/style.css'>
</head>

<body>
    <h1>Mine favoritter</h1>
    <a href='/'>Tilbage til forsiden</a>
    <div class='film-grid'>
        {% for f in film %}
        <div class='film-kort'>
            <img src='https://image.tmdb.org/t/p/w342/{{ f[2] }}' alt='{{
f[1] }}'>
            <h3>{{ f[1] }}</h3>
            <p>{{ f[4] }} — {{ f[3] }}/10</p>
        </div>
        {% endfor %}
    </div>
</body>

</html>
