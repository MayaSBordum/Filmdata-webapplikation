<!DOCTYPE html>
<html lang='da'>

<head>
    <meta charset='UTF-8'>
    <title>FilmData</title>
    <link rel='stylesheet' href='/static/style.css'>
</head>

<body>
    <h1>Films to watch</h1>
    <div class='film-grid'>
        {% for f in film %}
        <div class='film-kort'>
            <img src='https://image.tmdb.org/t/p/w342/{{ f.plakat }}' alt='{{ f.titel }}'>
            <div class="info">
                <div>
                    <h3>{{ f.titel }}</h3>
                    <p><div class="meta">{{ f.aar }} — {{ f.rating }}/10 ⭐ — {{ f.genres }}</div></p>
                    <p class="description">
                        <a href="{{ f.homepage }}">{{ f.homepage }}</a><br>
                        {{ f.beskrivelse }}
                    </p>
                    <a href='/gem/{{ f.titel }}'>★ Gem som favorit</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>

</html>
